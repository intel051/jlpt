<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Vocab Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'toss-blue': '#3182F6',
                        'toss-bg': '#F2F4F6',
                        'toss-text': '#191F28',
                        'toss-muted': '#8B95A1',
                        'toss-card': '#FFFFFF',
                    },
                },
            },
        };
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #F2F4F6;
            color: #191F28;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* Smooth View Transitions */
        .view-content {
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Skeleton Pulse */
        .skeleton {
            background: linear-gradient(90deg, #F2F4F6 25%, #E5E8EB 50%, #F2F4F6 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.8s infinite;
        }

        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .active-tab { color: #3182F6 !important; }
        .active-tab i { transform: translateY(-2px); }
        
        .button-bounce:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="app" class="w-full max-w-md min-h-screen bg-white flex flex-col relative shadow-2xl overflow-hidden">
        
        <!-- Global Toast -->
        <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 px-6 py-3 bg-toss-dark/90 bg-gray-900 text-white text-sm font-bold rounded-full shadow-2xl z-50 opacity-0 transition-all duration-500 pointer-events-none translate-y-[-20px]"></div>

        <!-- Header -->
        <header class="px-6 pt-14 pb-4 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-30">
            <h1 class="text-2xl font-black tracking-tight text-toss-text">JLPT Master</h1>
            <div id="score-badge" class="bg-blue-50 text-toss-blue px-3 py-1.5 rounded-full text-[11px] font-black uppercase">정답률 0%</div>
        </header>

        <!-- Main Content Section -->
        <main id="main-content" class="flex-1 px-6 pb-36 overflow-y-auto no-scrollbar">
            <!-- Dynamic Content -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-3xl border-t border-gray-100 px-10 pt-4 pb-10 flex justify-around items-center safe-area-bottom z-40">
            <button onclick="window.nav('generator')" class="nav-item flex flex-col items-center gap-1.5 text-toss-muted transition-all duration-300" id="nav-generator">
                <i class="fas fa-sparkles text-xl"></i>
                <span class="text-[10px] font-black">생성</span>
            </button>
            <button onclick="window.nav('lists')" class="nav-item flex flex-col items-center gap-1.5 text-toss-muted transition-all duration-300" id="nav-lists">
                <i class="fas fa-archive text-xl"></i>
                <span class="text-[10px] font-black">보관함</span>
            </button>
            <button onclick="window.nav('quiz')" class="nav-item flex flex-col items-center gap-1.5 text-toss-muted transition-all duration-300" id="nav-quiz">
                <i class="fas fa-bolt-lightning text-xl"></i>
                <span class="text-[10px] font-black">퀴즈</span>
            </button>
        </nav>
    </div>

    <script type="module">
        const state = {
            view: 'generator',
            level: 2,
            loading: false,
            words: [],
            saved: JSON.parse(localStorage.getItem('jlpt_v3_saved') || '[]'),
            stats: JSON.parse(localStorage.getItem('jlpt_v3_stats') || '{"c":0, "t":0}')
        };

        const main = document.getElementById('main-content');
        const toast = document.getElementById('toast');

        const showToast = (msg) => {
            toast.textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 2500);
        };

        const updateUI = () => {
            // Update Stats
            const rate = state.stats.t === 0 ? 0 : Math.round((state.stats.c / state.stats.t) * 100);
            document.getElementById('score-badge').textContent = `정답률 ${rate}%`;
            
            // Update Nav
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`nav-${state.view}`).classList.add('active-tab');

            if (state.loading) return renderLoading();
            
            switch(state.view) {
                case 'generator': renderGenerator(); break;
                case 'lists': renderLists(); break;
                case 'quiz': renderQuiz(); break;
            }
        };

        const renderLoading = () => {
            main.innerHTML = `
                <div class="view-content space-y-6 pt-4">
                    <div class="h-8 w-40 skeleton rounded-lg"></div>
                    <div class="h-52 skeleton rounded-[32px] w-full"></div>
                    <div class="space-y-4">
                        ${[1,2,3,4,5].map(() => `<div class="h-20 skeleton rounded-3xl w-full"></div>`).join('')}
                    </div>
                </div>
            `;
        };

        const renderGenerator = () => {
            main.innerHTML = `
                <div class="view-content pt-4">
                    <section class="mb-8">
                        <p class="text-[13px] font-black text-toss-muted mb-3 ml-1 uppercase tracking-wider">JLPT LEVEL</p>
                        <div class="flex gap-2">
                            ${[1,2,3,4].map(n => `
                                <button onclick="window.setLevel(${n})" class="flex-1 py-4 rounded-2xl font-black text-sm transition-all border-2 ${state.level === n ? 'bg-toss-blue text-white border-toss-blue shadow-lg shadow-blue-200' : 'bg-white text-toss-muted border-gray-50'}">N${n}</button>
                            `).join('')}
                        </div>
                    </section>

                    <button onclick="window.generate()" class="w-full py-5 bg-toss-blue text-white rounded-[28px] font-black text-lg shadow-xl shadow-blue-100 button-bounce transition-all mb-10">
                        단어 20개 가져오기
                    </button>

                    ${state.words.length > 0 ? `
                        <div class="flex justify-between items-center mb-6 px-1">
                            <h2 class="text-xl font-black text-toss-text">오늘의 추천 단어</h2>
                            <button onclick="window.saveAll()" class="text-toss-blue text-xs font-black">모두 저장</button>
                        </div>
                        <div class="space-y-3">
                            ${state.words.map((w, i) => `
                                <div class="p-5 rounded-[28px] bg-toss-bg/50 border border-white flex justify-between items-center transition-all">
                                    <div class="flex flex-col gap-0.5">
                                        <div class="flex items-center gap-2">
                                            <span class="text-[17px] font-black">${w.kanji}</span>
                                            <span class="text-[11px] text-toss-blue font-bold px-1.5 py-0.5 bg-blue-50 rounded-md">${w.kana}</span>
                                        </div>
                                        <p class="text-[14px] text-toss-muted font-medium">${w.korean_meaning}</p>
                                    </div>
                                    <button onclick="window.saveOne(${i})" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center text-toss-blue button-bounce"><i class="fas fa-plus text-xs"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="flex flex-col items-center justify-center py-24 text-toss-muted opacity-30">
                            <i class="fas fa-wand-magic-sparkles text-5xl mb-4"></i>
                            <p class="text-sm font-black">버튼을 눌러 단어를 생성하세요</p>
                        </div>
                    `}
                </div>
            `;
        };

        const renderLists = () => {
            main.innerHTML = `
                <div class="view-content pt-4">
                    <h2 class="text-2xl font-black mb-6 px-1">내 보관함 <span class="text-toss-blue ml-1">${state.saved.length}</span></h2>
                    <div class="space-y-3">
                        ${state.saved.length > 0 ? state.saved.map((w, i) => `
                            <div class="p-6 rounded-[32px] bg-white border border-gray-100 flex justify-between items-center shadow-sm">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[18px] font-black">${w.kanji}</span>
                                        <span class="text-[11px] text-toss-blue font-bold">${w.kana}</span>
                                    </div>
                                    <p class="text-sm text-toss-muted font-medium">${w.korean_meaning}</p>
                                </div>
                                <button onclick="window.removeSaved(${i})" class="text-gray-200 hover:text-red-400 transition-colors p-2"><i class="fas fa-trash-can text-sm"></i></button>
                            </div>
                        `).join('') : '<p class="text-center py-28 text-toss-muted font-medium">저장된 단어가 아직 없네요.</p>'}
                    </div>
                </div>
            `;
        };

        const renderQuiz = () => {
            main.innerHTML = `
                <div class="view-content flex flex-col items-center justify-center py-24">
                    <div class="w-24 h-24 bg-blue-50 rounded-[40px] flex items-center justify-center mb-8 rotate-3">
                        <i class="fas fa-bolt-lightning text-4xl text-toss-blue"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-3 text-toss-text">실전 테스트</h2>
                    <p class="text-toss-muted text-[15px] font-medium mb-10 text-center px-10 leading-relaxed">
                        보관된 단어 중 10개를 골라<br/>무작위 퀴즈를 진행합니다.
                    </p>
                    <button onclick="window.startQuiz()" class="px-12 py-5 bg-toss-blue text-white rounded-[28px] font-black text-lg shadow-xl shadow-blue-100 button-bounce transition-all">
                        테스트 시작
                    </button>
                </div>
            `;
        };

        // --- Global Actions ---
        window.nav = (v) => { state.view = v; updateUI(); };
        window.setLevel = (l) => { state.level = l; updateUI(); };
        
        window.generate = async () => {
            state.loading = true;
            updateUI();
            try {
                const res = await fetch('/api/vocab', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({level: state.level})
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '통신 오류');
                state.words = data;
            } catch (e) {
                showToast(`에러: ${e.message}`);
            } finally {
                state.loading = false;
                updateUI();
            }
        };

        window.saveOne = (i) => {
            const w = state.words[i];
            if (!state.saved.some(s => s.kanji === w.kanji)) {
                state.saved.unshift(w);
                localStorage.setItem('jlpt_v3_saved', JSON.stringify(state.saved));
                showToast(`"${w.kanji}" 저장 완료`);
            } else {
                showToast(`이미 있는 단어예요.`);
            }
        };

        window.saveAll = () => {
            const news = state.words.filter(w => !state.saved.some(s => s.kanji === w.kanji));
            state.saved = [...news, ...state.saved];
            localStorage.setItem('jlpt_v3_saved', JSON.stringify(state.saved));
            showToast(`${news.length}개 단어를 보관함에 넣었어요.`);
        };

        window.removeSaved = (i) => {
            state.saved.splice(i, 1);
            localStorage.setItem('jlpt_v3_saved', JSON.stringify(state.saved));
            updateUI();
        };

        // Init
        updateUI();
    </script>
</body>
</html>
