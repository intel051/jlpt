<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Vocab Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'toss-blue': '#3182F6',
                        'toss-text': '#191F28',
                        'toss-muted': '#8B95A1',
                        'level-1': '#F0F5FF', // 파스텔 블루
                        'level-2': '#F6F1FF', // 파스텔 퍼플
                        'level-3': '#E6FFFA', // 파스텔 민트
                        'level-4': '#FFF9E6', // 파스텔 옐로우
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                },
            },
        };
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #FFFFFF;
            color: #191F28;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.02em;
        }

        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* 부드러운 등장 애니메이션 */
        .view-content {
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 스켈레톤 로딩 */
        .skeleton {
            background: linear-gradient(90deg, #F9FAFB 25%, #F3F4F6 50%, #F9FAFB 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s infinite linear;
        }

        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 탭 활성화 효과 */
        .nav-item.active-tab { color: #3182F6; }
        .nav-item.active-tab i { transform: scale(1.1); transition: transform 0.3s ease; }
        
        .card-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }
        
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="flex flex-col items-center bg-gray-50">

    <div id="app" class="w-full max-w-md min-h-screen bg-white flex flex-col relative shadow-sm overflow-hidden">
        
        <!-- 토스트 알림 -->
        <div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 bg-gray-900/90 text-white text-[13px] font-bold rounded-2xl shadow-xl z-50 opacity-0 transition-all duration-300 pointer-events-none translate-y-[-10px]"></div>

        <!-- 헤더 -->
        <header class="px-6 pt-14 pb-4 flex justify-between items-center bg-white/80 backdrop-blur-xl sticky top-0 z-30">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-toss-blue uppercase tracking-[0.2em] mb-0.5">JLPT Master</span>
                <h1 class="text-xl font-black text-toss-text">단어 마스터</h1>
            </div>
            <div id="score-badge" class="bg-blue-50 text-toss-blue px-3.5 py-1.5 rounded-full text-[11px] font-black">정답률 0%</div>
        </header>

        <!-- 메인 콘텐츠 -->
        <main id="main-content" class="flex-1 px-6 pb-36 overflow-y-auto no-scrollbar">
            <!-- 자바스크립트로 렌더링 -->
        </main>

        <!-- 하단 내비게이션 -->
        <nav class="fixed bottom-6 w-[calc(100%-48px)] max-w-[384px] left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-2xl border border-gray-100 rounded-[32px] px-8 py-4 flex justify-around items-center shadow-2xl safe-area-bottom z-40">
            <button onclick="window.nav('generator')" class="nav-item flex flex-col items-center gap-1 text-toss-muted" id="nav-generator">
                <i class="fas fa-plus-circle text-xl"></i>
                <span class="text-[10px] font-bold">생성</span>
            </button>
            <button onclick="window.nav('lists')" class="nav-item flex flex-col items-center gap-1 text-toss-muted" id="nav-lists">
                <i class="fas fa-heart text-xl"></i>
                <span class="text-[10px] font-bold">보관함</span>
            </button>
            <button onclick="window.nav('quiz')" class="nav-item flex flex-col items-center gap-1 text-toss-muted" id="nav-quiz">
                <i class="fas fa-play-circle text-xl"></i>
                <span class="text-[10px] font-bold">퀴즈</span>
            </button>
        </nav>
    </div>

    <script type="module">
        const state = {
            view: 'generator',
            level: 2,
            loading: false,
            words: [],
            saved: JSON.parse(localStorage.getItem('jlpt_v3_saved') || '[]'),
            stats: JSON.parse(localStorage.getItem('jlpt_v3_stats') || '{"c":0, "t":0}')
        };

        const main = document.getElementById('main-content');
        const toast = document.getElementById('toast');

        const showToast = (msg) => {
            toast.textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-10px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
            }, 2000);
        };

        const updateUI = () => {
            const rate = state.stats.t === 0 ? 0 : Math.round((state.stats.c / state.stats.t) * 100);
            document.getElementById('score-badge').textContent = `정답률 ${rate}%`;
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`nav-${state.view}`).classList.add('active-tab');

            if (state.loading) return renderLoading();
            
            switch(state.view) {
                case 'generator': renderGenerator(); break;
                case 'lists': renderLists(); break;
                case 'quiz': renderQuiz(); break;
            }
        };

        const renderLoading = () => {
            main.innerHTML = `
                <div class="view-content space-y-6 pt-6">
                    <div class="h-6 w-32 skeleton rounded-full"></div>
                    <div class="flex gap-2">${[1,2,3,4].map(() => `<div class="flex-1 h-14 skeleton rounded-2xl"></div>`).join('')}</div>
                    <div class="h-16 skeleton rounded-3xl w-full"></div>
                    <div class="space-y-4 pt-4">
                        ${[1,2,3].map(() => `<div class="h-24 skeleton rounded-[32px] w-full"></div>`).join('')}
                    </div>
                </div>
            `;
        };

        const renderGenerator = () => {
            const levelColors = { 1: 'bg-level-1', 2: 'bg-level-2', 3: 'bg-level-3', 4: 'bg-level-4' };
            const levelText = { 1: 'text-blue-600', 2: 'text-purple-600', 3: 'text-teal-600', 4: 'text-orange-600' };

            main.innerHTML = `
                <div class="view-content pt-6">
                    <section class="mb-10">
                        <div class="flex justify-between items-end mb-4 px-1">
                            <p class="text-[13px] font-black text-gray-400 uppercase tracking-tighter">Choose Level</p>
                            <span class="text-[12px] font-bold ${levelText[state.level]}">N${state.level} 레벨 선택됨</span>
                        </div>
                        <div class="flex gap-2">
                            ${[1,2,3,4].map(n => `
                                <button onclick="window.setLevel(${n})" class="flex-1 py-4 rounded-2xl font-black text-sm transition-all border-2 ${state.level === n ? 'bg-white border-toss-blue text-toss-blue shadow-lg shadow-blue-50' : 'bg-white text-gray-300 border-gray-50'}">N${n}</button>
                            `).join('')}
                        </div>
                    </section>

                    <button onclick="window.generate()" class="w-full py-5 bg-toss-blue text-white rounded-[24px] font-black text-[17px] shadow-xl shadow-blue-100 btn-press transition-all mb-12">
                        오늘의 단어 생성하기
                    </button>

                    ${state.words.length > 0 ? `
                        <div class="flex justify-between items-center mb-6 px-1">
                            <h2 class="text-lg font-black text-toss-text">추천 단어 리스트</h2>
                            <button onclick="window.saveAll()" class="text-toss-blue text-[13px] font-black px-3 py-1 bg-blue-50 rounded-lg">전체 저장</button>
                        </div>
                        <div class="space-y-4">
                            ${state.words.map((w, i) => `
                                <div class="p-6 rounded-[32px] ${levelColors[state.level]} border border-white/50 flex justify-between items-center card-shadow group">
                                    <div class="flex flex-col gap-1">
                                        <div class="flex items-center gap-2">
                                            <span class="text-[20px] font-black tracking-tight">${w.kanji}</span>
                                            <span class="text-[11px] font-bold px-2 py-0.5 bg-white/60 rounded-full text-gray-500">${w.kana}</span>
                                        </div>
                                        <p class="text-[15px] text-gray-600 font-bold">${w.korean_meaning}</p>
                                    </div>
                                    <button onclick="window.saveOne(${i})" class="w-10 h-10 rounded-2xl bg-white flex items-center justify-center text-toss-blue shadow-sm btn-press transition-transform">
                                        <i class="fas fa-heart"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="flex flex-col items-center justify-center py-20 text-center">
                            <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-6">
                                <i class="fas fa-cloud-sun text-3xl text-gray-200"></i>
                            </div>
                            <p class="text-[15px] font-bold text-gray-300 leading-relaxed">아직 생성된 단어가 없어요.<br/>상단의 버튼을 눌러보세요!</p>
                        </div>
                    `}
                </div>
            `;
        };

        const renderLists = () => {
            main.innerHTML = `
                <div class="view-content pt-6">
                    <div class="flex items-center gap-2 mb-8 px-1">
                        <h2 class="text-2xl font-black">나의 보관함</h2>
                        <span class="bg-blue-500 text-white text-[11px] font-black px-2 py-0.5 rounded-full">${state.saved.length}</span>
                    </div>
                    <div class="space-y-4">
                        ${state.saved.length > 0 ? state.saved.map((w, i) => `
                            <div class="p-6 rounded-[32px] bg-white border border-gray-100 flex justify-between items-center card-shadow">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[18px] font-black">${w.kanji}</span>
                                        <span class="text-[11px] text-toss-blue font-bold tracking-tighter">${w.kana}</span>
                                    </div>
                                    <p class="text-[14px] text-gray-500 font-bold">${w.korean_meaning}</p>
                                </div>
                                <button onclick="window.removeSaved(${i})" class="w-10 h-10 rounded-2xl bg-red-50 text-red-400 flex items-center justify-center btn-press"><i class="fas fa-trash-alt text-sm"></i></button>
                            </div>
                        `).join('') : `
                            <div class="flex flex-col items-center justify-center py-24 text-center">
                                <i class="fas fa-inbox text-5xl text-gray-100 mb-6"></i>
                                <p class="text-gray-300 font-bold">보관함이 비어있습니다.</p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        };

        const renderQuiz = () => {
            main.innerHTML = `
                <div class="view-content flex flex-col items-center justify-center py-24 px-4 text-center">
                    <div class="w-28 h-28 bg-blue-50 rounded-[44px] flex items-center justify-center mb-10 transform rotate-6 shadow-inner">
                        <i class="fas fa-fire text-5xl text-toss-blue"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-4">학습 퀴즈 도전</h2>
                    <p class="text-gray-400 text-[15px] font-bold mb-12 leading-relaxed">
                        내가 저장한 단어들을 바탕으로<br/>실력을 점검해볼까요?
                    </p>
                    <button onclick="window.startQuiz()" class="w-full py-5 bg-gray-900 text-white rounded-[24px] font-black text-lg shadow-2xl btn-press transition-all">
                        퀴즈 시작하기
                    </button>
                    <p class="mt-6 text-[12px] text-gray-300 font-bold">최근 학습일: 2026.03.07</p>
                </div>
            `;
        };

        // --- Actions ---
        window.nav = (v) => { state.view = v; updateUI(); };
        window.setLevel = (l) => { state.level = l; updateUI(); };
        
        window.generate = async () => {
            state.loading = true;
            updateUI();
            try {
                const res = await fetch('/api/vocab', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({level: state.level})
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '연결에 실패했습니다.');
                state.words = data;
            } catch (e) {
                showToast(`오류: ${e.message}`);
            } finally {
                state.loading = false;
                updateUI();
            }
        };

        window.saveOne = (i) => {
            const w = state.words[i];
            if (!state.saved.some(s => s.kanji === w.kanji)) {
                state.saved.unshift(w);
                localStorage.setItem('jlpt_v3_saved', JSON.stringify(state.saved));
                showToast(`"${w.kanji}" 단어를 저장했어요!`);
            } else {
                showToast(`이미 보관함에 있는 단어예요.`);
            }
        };

        window.saveAll = () => {
            const news = state.words.filter(w => !state.saved.some(s => s.kanji === w.kanji));
            state.saved = [...news, ...state.saved];
            localStorage.setItem('jlpt_v3_saved', JSON.stringify(state.saved));
            showToast(`${news.length}개의 단어를 모두 저장했습니다.`);
        };

        window.removeSaved = (i) => {
            state.saved.splice(i, 1);
            localStorage.setItem('jlpt_v3_saved', JSON.stringify(state.saved));
            updateUI();
            showToast(`삭제되었습니다.`);
        };

        window.startQuiz = () => {
            if (state.saved.length < 5) {
                return showToast('퀴즈를 풀려면 최소 5개의 단어가 필요해요.');
            }
            showToast('퀴즈 기능 준비 중입니다!');
        };

        // 초기 실행
        updateUI();
    </script>
</body>
</html>
