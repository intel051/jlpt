<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Vocab Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'toss-blue': '#3182F6',
                        'toss-text': '#191F28',
                        'toss-muted': '#8B95A1',
                        'level-1': '#F0F5FF',
                        'level-2': '#F6F1FF',
                        'level-3': '#E6FFFA',
                        'level-4': '#FFF9E6',
                    }
                },
            },
        };
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #F9FAFB; color: #191F28; -webkit-font-smoothing: antialiased; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .view-content { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #F2F4F6 25%, #E5E8EB 50%, #F2F4F6 75%); background-size: 200% 100%; animation: pulse 1.5s infinite linear; }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-item.active-tab { color: #3182F6; }
        .modal-bg { background-color: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .modal-content { animation: modalUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="app" class="w-full max-w-md min-h-screen bg-white flex flex-col relative overflow-hidden shadow-sm">
        
        <!-- Toast -->
        <div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 bg-gray-900/90 text-white text-[13px] font-bold rounded-2xl shadow-xl z-[60] opacity-0 transition-all duration-300 pointer-events-none translate-y-[-10px]"></div>

        <!-- Header -->
        <header class="px-6 pt-14 pb-4 flex justify-between items-center bg-white/80 backdrop-blur-xl sticky top-0 z-30">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-toss-blue uppercase tracking-widest">JLPT Master</span>
                <h1 class="text-xl font-black" id="header-title">단어 생성</h1>
            </div>
            <div id="score-badge" class="bg-blue-50 text-toss-blue px-3.5 py-1.5 rounded-full text-[11px] font-black">정답률 0%</div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 px-6 pb-36 overflow-y-auto no-scrollbar">
            <!-- Dynamic Views -->
        </main>

        <!-- Modal (Detail Popup) -->
        <div id="modal" class="hidden fixed inset-0 z-50 flex items-end">
            <div class="modal-bg absolute inset-0" onclick="window.closeModal()"></div>
            <div class="modal-content relative w-full bg-white rounded-t-[40px] px-8 pt-10 pb-12 shadow-2xl overflow-y-auto max-h-[85vh]">
                <div class="w-12 h-1.5 bg-gray-100 rounded-full mx-auto mb-8"></div>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="fixed bottom-6 w-[calc(100%-48px)] max-w-[384px] left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-2xl border border-gray-100 rounded-[32px] px-8 py-4 flex justify-around items-center shadow-2xl safe-area-bottom z-40">
            <button onclick="window.nav('generator')" class="nav-item flex flex-col items-center gap-1 text-toss-muted" id="nav-generator">
                <i class="fas fa-plus-circle text-xl"></i>
                <span class="text-[10px] font-bold">생성</span>
            </button>
            <button onclick="window.nav('folders')" class="nav-item flex flex-col items-center gap-1 text-toss-muted" id="nav-folders">
                <i class="fas fa-folder text-xl"></i>
                <span class="text-[10px] font-bold">폴더</span>
            </button>
            <button onclick="window.nav('quiz')" class="nav-item flex flex-col items-center gap-1 text-toss-muted" id="nav-quiz">
                <i class="fas fa-bolt text-xl"></i>
                <span class="text-[10px] font-bold">퀴즈</span>
            </button>
        </nav>
    </div>

    <script type="module">
        const state = {
            view: 'generator', // generator, folders, folderDetail
            currentFolderId: null,
            level: 2,
            loading: false,
            words: [],
            // folders: [{id, name, words: []}]
            folders: JSON.parse(localStorage.getItem('jlpt_v4_folders') || '[{"id":"f1","name":"기본 폴더","words":[]}]'),
            stats: JSON.parse(localStorage.getItem('jlpt_v4_stats') || '{"c":0, "t":0}')
        };

        const main = document.getElementById('main-content');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');
        const toast = document.getElementById('toast');

        const showToast = (msg) => {
            toast.textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-10px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
            }, 2000);
        };

        const updateUI = () => {
            const rate = state.stats.t === 0 ? 0 : Math.round((state.stats.c / state.stats.t) * 100);
            document.getElementById('score-badge').textContent = `정답률 ${rate}%`;
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-tab'));
            const activeNavId = state.view === 'folderDetail' ? 'nav-folders' : `nav-${state.view}`;
            if(document.getElementById(activeNavId)) document.getElementById(activeNavId).classList.add('active-tab');

            if (state.loading) return renderLoading();
            
            switch(state.view) {
                case 'generator': renderGenerator(); break;
                case 'folders': renderFolders(); break;
                case 'folderDetail': renderFolderDetail(); break;
                case 'quiz': renderQuiz(); break;
            }
        };

        const renderLoading = () => {
            main.innerHTML = `<div class="pt-10 space-y-6">${Array(5).fill('<div class="h-24 skeleton rounded-[32px] w-full"></div>').join('')}</div>`;
        };

        const renderGenerator = () => {
            document.getElementById('header-title').textContent = '단어 생성';
            const levelColors = { 1: 'bg-level-1', 2: 'bg-level-2', 3: 'bg-level-3', 4: 'bg-level-4' };
            main.innerHTML = `
                <div class="view-content pt-6">
                    <div class="flex gap-2 mb-8">
                        ${[1,2,3,4].map(n => `<button onclick="window.setLevel(${n})" class="flex-1 py-4 rounded-2xl font-black text-sm transition-all border-2 ${state.level === n ? 'bg-white border-toss-blue text-toss-blue shadow-lg shadow-blue-50' : 'bg-white text-gray-300 border-gray-50'}">N${n}</button>`).join('')}
                    </div>
                    <button onclick="window.generate()" class="w-full py-5 bg-toss-blue text-white rounded-[24px] font-black text-[17px] shadow-xl shadow-blue-100 btn-press mb-10">오늘의 단어 생성하기</button>
                    <div class="space-y-4">
                        ${state.words.map((w, i) => `
                            <div onclick="window.openDetail(${i}, 'gen')" class="p-6 rounded-[32px] ${levelColors[state.level]} border border-white flex justify-between items-center shadow-sm btn-press cursor-pointer">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[20px] font-black">${w.kanji}</span>
                                        <span class="text-[11px] font-bold px-2 py-0.5 bg-white/60 rounded-full text-gray-500">${w.kana}</span>
                                    </div>
                                    <p class="text-[15px] text-gray-600 font-bold">${w.korean_meaning}</p>
                                </div>
                                <div class="text-toss-muted opacity-30"><i class="fas fa-chevron-right"></i></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const renderFolders = () => {
            document.getElementById('header-title').textContent = '나의 폴더';
            main.innerHTML = `
                <div class="view-content pt-6">
                    <div class="flex justify-between items-center mb-6">
                        <p class="text-[13px] font-black text-gray-400 uppercase tracking-widest">Saved Folders</p>
                        <button onclick="window.createFolder()" class="text-toss-blue font-black text-[13px] px-3 py-1 bg-blue-50 rounded-lg">폴더 추가</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${state.folders.map((f, i) => `
                            <div onclick="window.openFolder('${f.id}')" class="p-6 rounded-[32px] bg-white border border-gray-100 shadow-sm btn-press cursor-pointer relative">
                                <div class="w-10 h-10 rounded-2xl bg-gray-50 flex items-center justify-center text-toss-blue mb-4"><i class="fas fa-folder"></i></div>
                                <h3 class="font-black text-[16px] mb-1 truncate">${f.name}</h3>
                                <p class="text-[12px] text-toss-muted font-bold">${f.words.length}개 단어</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const renderFolderDetail = () => {
            const folder = state.folders.find(f => f.id === state.currentFolderId);
            document.getElementById('header-title').textContent = folder.name;
            main.innerHTML = `
                <div class="view-content pt-6">
                    <div class="flex justify-between items-center mb-8">
                        <button onclick="window.nav('folders')" class="text-toss-muted font-bold text-sm"><i class="fas fa-arrow-left mr-1"></i> 뒤로가기</button>
                        <div class="flex gap-2">
                            <button onclick="window.renameFolder('${folder.id}')" class="text-gray-400 font-bold text-xs">이름 변경</button>
                            <button onclick="window.deleteFolder('${folder.id}')" class="text-red-300 font-bold text-xs">폴더 삭제</button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${folder.words.length > 0 ? folder.words.map((w, i) => `
                            <div onclick="window.openDetail(${i}, 'folder')" class="p-6 rounded-[32px] bg-white border border-gray-100 flex justify-between items-center shadow-sm btn-press cursor-pointer">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[18px] font-black">${w.kanji}</span>
                                        <span class="text-[11px] text-toss-blue font-bold tracking-tighter">${w.kana}</span>
                                    </div>
                                    <p class="text-[14px] text-gray-500 font-bold">${w.korean_meaning}</p>
                                </div>
                                <div class="text-toss-muted opacity-20"><i class="fas fa-chevron-right"></i></div>
                            </div>
                        `).join('') : '<p class="text-center py-20 text-gray-300 font-bold">폴더가 비어있습니다.</p>'}
                    </div>
                </div>
            `;
        };

        const renderQuiz = () => {
            main.innerHTML = `<div class="view-content py-20 text-center"><i class="fas fa-fire text-5xl text-toss-blue mb-6"></i><h2 class="text-2xl font-black mb-4">학습 퀴즈</h2><p class="text-gray-400 font-bold mb-10">보관함의 단어로 퀴즈를 풀어보세요.</p><button onclick="window.startQuiz()" class="w-full py-5 bg-gray-900 text-white rounded-[24px] font-black">시작하기</button></div>`;
        };

        // --- Logic Functions ---
        window.nav = (v) => { state.view = v; updateUI(); };
        window.setLevel = (l) => { state.level = l; updateUI(); };
        
        window.generate = async () => {
            state.loading = true; updateUI();
            try {
                const res = await fetch('/api/vocab', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({level: state.level}) });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '연결 실패');
                state.words = data;
            } catch (e) { showToast(`오류: ${e.message}`); }
            finally { state.loading = false; updateUI(); }
        };

        window.openDetail = (index, type) => {
            const word = type === 'gen' ? state.words[index] : state.folders.find(f => f.id === state.currentFolderId).words[index];
            const isSaved = state.folders.some(f => f.words.some(w => w.kanji === word.kanji));
            
            modalBody.innerHTML = `
                <div class="flex flex-col items-center text-center mb-10">
                    <span class="text-[12px] font-black text-toss-blue px-3 py-1 bg-blue-50 rounded-full mb-4 uppercase">${word.part_of_speech || 'N' + state.level}</span>
                    <h2 class="text-4xl font-black mb-2">${word.kanji}</h2>
                    <p class="text-lg font-bold text-gray-400 mb-4">${word.kana}</p>
                    <p class="text-2xl font-black text-gray-800">${word.korean_meaning}</p>
                </div>

                <div class="space-y-6 mb-10">
                    <p class="text-xs font-black text-gray-300 uppercase tracking-widest ml-1">Example Sentences</p>
                    ${word.examples.map(ex => `
                        <div class="p-6 rounded-[28px] bg-gray-50 border border-gray-100">
                            <p class="text-[16px] font-bold text-gray-800 mb-2 leading-relaxed">${ex.jp}</p>
                            <p class="text-[14px] text-gray-500 font-medium">${ex.kr}</p>
                        </div>
                    `).join('')}
                </div>

                <div class="flex gap-3">
                    <div class="flex-1 relative">
                        <select id="folder-select" class="w-full py-5 px-6 bg-gray-100 rounded-[24px] font-black text-sm appearance-none outline-none">
                            ${state.folders.map(f => `<option value="${f.id}">${f.name}</option>`).join('')}
                        </select>
                        <i class="fas fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                    </div>
                    <button onclick="window.saveToFolder('${encodeURIComponent(JSON.stringify(word))}')" class="flex-[1.2] py-5 bg-toss-blue text-white rounded-[24px] font-black text-[16px] shadow-lg shadow-blue-100">
                        ${isSaved ? '다른 폴더에 추가' : '단어장에 저장'}
                    </button>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        window.closeModal = () => modal.classList.add('hidden');

        window.saveToFolder = (wordData) => {
            const word = JSON.parse(decodeURIComponent(wordData));
            const folderId = document.getElementById('folder-select').value;
            const folder = state.folders.find(f => f.id === folderId);
            
            if (folder.words.some(w => w.kanji === word.kanji)) {
                return showToast('이미 이 폴더에 있는 단어입니다.');
            }
            
            folder.words.unshift(word);
            localStorage.setItem('jlpt_v4_folders', JSON.stringify(state.folders));
            showToast(`"${folder.name}"에 저장 완료!`);
            window.closeModal();
            updateUI();
        };

        // --- Folder Management ---
        window.openFolder = (id) => { state.currentFolderId = id; state.view = 'folderDetail'; updateUI(); };
        
        window.createFolder = () => {
            const name = prompt('새 폴더 이름을 입력하세요:');
            if (!name) return;
            state.folders.push({ id: 'f' + Date.now(), name, words: [] });
            localStorage.setItem('jlpt_v4_folders', JSON.stringify(state.folders));
            updateUI();
        };

        window.renameFolder = (id) => {
            const folder = state.folders.find(f => f.id === id);
            const name = prompt('폴더 이름 수정:', folder.name);
            if (!name) return;
            folder.name = name;
            localStorage.setItem('jlpt_v4_folders', JSON.stringify(state.folders));
            updateUI();
        };

        window.deleteFolder = (id) => {
            if (state.folders.length === 1) return showToast('최소 한 개의 폴더는 있어야 합니다.');
            if (!confirm('폴더와 안의 단어들을 모두 삭제할까요?')) return;
            state.folders = state.folders.filter(f => f.id !== id);
            localStorage.setItem('jlpt_v4_folders', JSON.stringify(state.folders));
            state.view = 'folders';
            updateUI();
        };

        window.startQuiz = () => {
            const allWords = state.folders.reduce((acc, f) => acc + f.words.length, 0);
            if (allWords < 5) return showToast('퀴즈를 위해 최소 5개의 단어를 저장해 주세요.');
            showToast('퀴즈 기능 준비 중!');
        };

        updateUI();
    </script>
</body>
</html>
