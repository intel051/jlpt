<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Master</title>
    <!-- Pretendard JP Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'toss-blue': '#3182F6',
                        'toss-text': '#191F28',
                        'toss-muted': '#8B95A1',
                        'glass-bg': 'rgba(255, 255, 255, 0.8)',
                        'pastel-blue': '#E3F2FD',
                        'pastel-purple': '#F3E5F5',
                        'pastel-green': '#E8F5E9',
                        'pastel-pink': '#FCE4EC',
                        'pastel-orange': '#FFF3E0',
                    }
                },
            },
        };
    </script>
    <style>
        body { 
            font-family: "Pretendard JP", sans-serif; 
            background-color: #F2F4F6; 
            color: #191F28; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent;
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .view-content { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.4); }
        .toss-card { background: #ffffff; border-radius: 32px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02); border: 1px solid rgba(0,0,0,0.03); }
        
        .loading-spinner { width: 44px; height: 44px; border: 5px solid rgba(49, 130, 246, 0.1); border-top: 5px solid #3182F6; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-item.active-tab { color: #3182F6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .modal-overlay { background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(12px); animation: fadeIn 0.3s ease-out; }
        .modal-glass { animation: modalEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .btn-press:active { transform: scale(0.96); }
        .skeleton { background: linear-gradient(90deg, #F2F4F6 25%, #E5E8EB 50%, #F2F4F6 75%); background-size: 200% 100%; animation: pulse 1.5s infinite linear; }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Dynamic Interaction Chips */
        .chip-synonym { 
            @apply px-3 py-1.5 bg-pastel-blue text-blue-700 rounded-xl text-[11px] font-black cursor-pointer border border-white/50 transition-all shadow-sm;
            transition: all 0.2s ease;
        }
        .chip-synonym:hover { background-color: #3182F6; color: white; transform: translateY(-2px); }

        .chip-antonym { 
            @apply px-3 py-1.5 bg-pastel-pink text-pink-700 rounded-xl text-[11px] font-black cursor-pointer border border-white/50 transition-all shadow-sm;
            transition: all 0.2s ease;
        }
        .chip-antonym:hover { background-color: #EF4444; color: white; transform: translateY(-2px); }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="app" class="w-full max-w-md min-h-screen bg-white flex flex-col relative overflow-hidden shadow-2xl">
        
        <!-- Header -->
        <header id="app-header" class="px-6 pt-14 pb-4 flex justify-between items-center sticky top-0 bg-white/70 backdrop-blur-xl z-30">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-toss-blue tracking-widest uppercase">JLPT Master</span>
                <h1 class="text-xl font-black text-toss-text tracking-tight" id="header-title">오늘의 단어</h1>
            </div>
            <div id="quiz-badge" class="hidden bg-blue-50 text-toss-blue px-3.5 py-1.5 rounded-full text-[11px] font-black uppercase tracking-tighter">정답률 0%</div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 px-6 pb-40 overflow-y-auto no-scrollbar">
            <!-- Dynamic Content -->
        </main>

        <!-- Glass Modal (Detail) -->
        <div id="modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center px-6">
            <div class="modal-overlay absolute inset-0" onclick="window.closeModal()"></div>
            <div class="modal-glass glass-panel relative w-full max-w-sm rounded-[48px] p-8 shadow-2xl overflow-hidden border border-white/60">
                <button onclick="window.closeModal()" class="absolute top-7 right-7 w-9 h-9 bg-black/5 rounded-full flex items-center justify-center text-gray-400 btn-press">
                    <i class="fas fa-times text-sm"></i>
                </button>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- Floating Bottom Navigation -->
        <nav class="fixed bottom-8 w-[calc(100%-48px)] max-w-[384px] left-1/2 -translate-x-1/2 glass-panel rounded-[36px] px-8 py-4 flex justify-around items-center shadow-2xl safe-area-bottom z-40">
            <button onclick="window.nav('generator')" class="nav-item flex flex-col items-center gap-1.5 text-toss-muted" id="nav-generator"><i class="fas fa-sparkles text-xl"></i><span class="text-[10px] font-black">생성</span></button>
            <button onclick="window.nav('folders')" class="nav-item flex flex-col items-center gap-1.5 text-toss-muted" id="nav-folders"><i class="fas fa-folder-open text-xl"></i><span class="text-[10px] font-black">보관함</span></button>
            <button onclick="window.nav('quiz')" class="nav-item flex flex-col items-center gap-1.5 text-toss-muted" id="nav-quiz"><i class="fas fa-fire text-xl"></i><span class="text-[10px] font-black">퀴즈</span></button>
            <button onclick="window.nav('dict')" class="nav-item flex flex-col items-center gap-1.5 text-toss-muted" id="nav-dict"><i class="fas fa-book-open text-xl"></i><span class="text-[10px] font-black">사전</span></button>
        </nav>
        
        <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 px-5 py-3 bg-gray-900/90 text-white text-[13px] font-bold rounded-2xl shadow-xl z-[70] opacity-0 transition-all duration-300 pointer-events-none"></div>
    </div>

    <script type="module">
        const state = {
            view: 'generator',
            level: 2,
            loading: false,
            words: [],
            folders: JSON.parse(localStorage.getItem('jlpt_v6_folders') || '[{"id":"f1","name":"기본 폴더","words":[]}]'),
            stats: JSON.parse(localStorage.getItem('jlpt_v6_stats') || '{"c":0, "t":0}'),
            currentFolderId: null,
            dictSearch: '',
        };

        const main = document.getElementById('main-content');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');
        const toast = document.getElementById('toast');
        const quizBadge = document.getElementById('quiz-badge');

        const showToast = (msg) => {
            toast.textContent = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 2000);
        };

        const updateUI = () => {
            quizBadge.classList.toggle('hidden', state.view !== 'quiz');
            if (state.view === 'quiz') {
                const rate = state.stats.t === 0 ? 0 : Math.round((state.stats.c / state.stats.t) * 100);
                quizBadge.textContent = `정답률 ${rate}%`;
            }

            const activeNavId = (state.view === 'folderDetail') ? 'nav-folders' : `nav-${state.view}`;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-tab'));
            if(document.getElementById(activeNavId)) document.getElementById(activeNavId).classList.add('active-tab');

            if (state.loading) return renderLoading();
            
            switch(state.view) {
                case 'generator': renderGenerator(); break;
                case 'folders': renderFolders(); break;
                case 'folderDetail': renderFolderDetail(); break;
                case 'quiz': renderQuiz(); break;
                case 'dict': renderDict(); break;
            }
        };

        const renderLoading = () => {
            main.innerHTML = `<div class="pt-10 space-y-6">${Array(4).fill('<div class="h-32 skeleton rounded-[40px] w-full"></div>').join('')}</div>`;
        };

        const renderGenerator = () => {
            document.getElementById('header-title').textContent = '단어 생성';
            const colors = { 1: 'bg-pastel-blue', 2: 'bg-pastel-purple', 3: 'bg-pastel-green', 4: 'bg-pastel-orange' };
            main.innerHTML = `
                <div class="view-content pt-6">
                    <div class="flex gap-2 mb-8">
                        ${[1,2,3,4].map(n => `<button onclick="window.setLevel(${n})" class="flex-1 py-4 rounded-2xl font-black text-sm transition-all border-2 ${state.level === n ? 'bg-white border-toss-blue text-toss-blue shadow-lg shadow-blue-50' : 'bg-white text-gray-300 border-gray-100'}">N${n}</button>`).join('')}
                    </div>
                    <button onclick="window.generate()" class="w-full py-5 bg-toss-blue text-white rounded-[28px] font-black text-[17px] shadow-xl shadow-blue-100 btn-press mb-10 transition-all">랜덤 단어 가져오기</button>
                    <div class="space-y-4">
                        ${state.words.map((w, i) => `
                            <div onclick="window.openDetail(${i}, 'gen')" class="p-7 rounded-[40px] ${colors[state.level]} border border-white flex justify-between items-center shadow-sm btn-press cursor-pointer group">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[22px] font-black text-gray-800">${w.kanji}</span>
                                        <span class="text-[11px] font-black px-2 py-0.5 bg-white/60 rounded-full text-gray-500">${w.kana}</span>
                                    </div>
                                    <p class="text-[15px] text-gray-600 font-bold">${w.korean_meaning}</p>
                                </div>
                                <div class="w-10 h-10 rounded-full bg-white/40 flex items-center justify-center text-gray-400 group-hover:bg-white transition-colors"><i class="fas fa-chevron-right text-xs"></i></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const renderFolders = () => {
            document.getElementById('header-title').textContent = '보관함';
            main.innerHTML = `
                <div class="view-content pt-6 grid grid-cols-2 gap-4">
                    ${state.folders.map((f) => `
                        <div onclick="window.openFolder('${f.id}')" class="p-6 rounded-[40px] bg-white border border-gray-100 shadow-sm btn-press cursor-pointer">
                            <div class="w-12 h-12 rounded-3xl bg-pastel-blue flex items-center justify-center text-toss-blue mb-5 shadow-inner"><i class="fas fa-folder"></i></div>
                            <h3 class="font-black text-[17px] mb-1 truncate">${f.name}</h3>
                            <p class="text-[12px] text-gray-400 font-bold">${f.words.length} 단어</p>
                        </div>
                    `).join('')}
                    <button onclick="window.createFolder()" class="p-6 rounded-[40px] border-2 border-dashed border-gray-100 flex flex-col items-center justify-center text-gray-300 gap-2 btn-press">
                        <i class="fas fa-plus"></i><span class="text-xs font-bold">폴더 추가</span>
                    </button>
                </div>
            `;
        };

        const renderFolderDetail = () => {
            const folder = state.folders.find(f => f.id === state.currentFolderId);
            document.getElementById('header-title').textContent = folder.name;
            main.innerHTML = `
                <div class="view-content pt-6 space-y-4">
                    <button onclick="window.nav('folders')" class="text-gray-400 font-bold text-sm mb-4"><i class="fas fa-arrow-left mr-2"></i>돌아가기</button>
                    ${folder.words.map((w, i) => `
                        <div onclick="window.openDetail(${i}, 'folder')" class="p-7 rounded-[40px] bg-white border border-gray-100 flex justify-between items-center shadow-sm btn-press cursor-pointer">
                            <div><div class="flex items-center gap-2 mb-1"><span class="text-[18px] font-black">${w.kanji}</span><span class="text-[11px] text-toss-blue font-black">${w.kana}</span></div><p class="text-[15px] text-gray-500 font-bold">${w.korean_meaning}</p></div>
                            <div class="text-gray-200"><i class="fas fa-chevron-right text-xs"></i></div>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        const renderDict = () => {
            document.getElementById('header-title').textContent = '모찌 사전';
            main.innerHTML = `
                <div class="view-content pt-10 flex flex-col space-y-8">
                    <div class="text-center space-y-4">
                        <div class="w-24 h-24 bg-white toss-card flex items-center justify-center mx-auto text-5xl">🍡</div>
                        <h2 class="text-4xl font-black tracking-tight">모찌 사전</h2>
                        <p class="text-toss-muted text-sm font-bold opacity-60">AI 일본어 분석</p>
                    </div>
                    <div class="relative">
                        <input type="text" id="dictInput" value="${state.dictSearch}" placeholder="단어를 검색하세요" class="w-full bg-white toss-card py-5 px-14 text-lg outline-none border-none shadow-xl shadow-black/[0.03]">
                        <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-toss-blue"></i>
                        <button onclick="window.searchDict()" class="absolute right-4 top-1/2 -translate-y-1/2 px-5 py-2.5 bg-toss-blue text-white rounded-2xl text-[11px] font-black btn-press shadow-lg shadow-blue-50">검색</button>
                    </div>
                    <div id="dictResults"></div>
                </div>
            `;
            const input = document.getElementById('dictInput');
            if(input) input.onkeypress = e => e.key === 'Enter' && window.searchDict();
        };

        window.searchDict = async (wordQuery) => {
            const query = wordQuery || document.getElementById('dictInput').value;
            if(!query.trim()) return;
            state.dictSearch = query;
            const container = document.getElementById('dictResults');
            if(container) container.innerHTML = `<div class="flex flex-col items-center py-20 gap-5"><div class="loading-spinner"></div><p class="text-sm font-bold text-gray-300">정교하게 분석 중...</p></div>`;
            try {
                const response = await fetch('/api/vocab', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
                const data = await response.json();
                renderDictResult(data); 
            } catch (e) { container.innerHTML = `<p class="text-center py-20 text-red-200 font-bold">정보를 가져오지 못했습니다.</p>`; }
        };

        const renderDictResult = (word) => {
            const container = document.getElementById('dictResults');
            if(!container) return;
            container.innerHTML = `
                <div class="space-y-6 view-content">
                    <div class="toss-card p-12 text-center relative overflow-hidden">
                        <span class="px-5 py-1.5 bg-gray-50 text-toss-blue rounded-full text-[13px] font-black mb-6 tracking-widest inline-block">${word.kana}</span>
                        <h2 class="text-6xl font-black mb-6 tracking-tighter">${word.kanji}</h2>
                        <p class="text-2xl text-gray-500 font-bold">${word.korean_meaning}</p>
                    </div>

                    ${word.humble ? `
                    <div class="p-8 rounded-[40px] bg-pastel-pink/30 border border-pastel-pink shadow-sm">
                        <h3 class="text-xs font-black text-pink-600/50 mb-4 uppercase tracking-widest">✨ 정중한 표현</h3>
                        <p class="text-2xl font-black text-pink-700 mb-2">${word.humble.jp}</p>
                        <p class="text-lg font-bold text-gray-600 mb-4">${word.humble.kr}</p>
                        <p class="text-[13px] text-gray-400 font-medium">${word.humble.note}</p>
                    </div>` : ''}

                    <div class="grid grid-cols-2 gap-4">
                        <div class="toss-card p-7">
                            <h4 class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">유의어</h4>
                            <div class="flex flex-wrap gap-2">
                                ${word.synonyms && word.synonyms.length > 0 ? word.synonyms.map(s => `
                                    <span onclick="window.searchInDict('${s.split('(')[0]}')" class="chip-synonym">
                                        ${s}
                                    </span>`).join('') : '<span class="text-xs text-gray-200">없음</span>'}
                            </div>
                        </div>
                        <div class="toss-card p-7">
                            <h4 class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">반의어</h4>
                            <div class="flex flex-wrap gap-2">
                                ${word.antonyms && word.antonyms.length > 0 ? word.antonyms.map(a => `
                                    <span onclick="window.searchInDict('${a.split('(')[0]}')" class="chip-antonym">
                                        ${a}
                                    </span>`).join('') : '<span class="text-xs text-gray-200">없음</span>'}
                            </div>
                        </div>
                    </div>

                    <div class="toss-card p-8">
                        <h4 class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-6">문장 예시</h4>
                        <div class="space-y-4">
                            ${word.examples.map(ex => `
                                <div class="p-6 rounded-[32px] bg-gray-50 border border-white/50">
                                    <p class="text-lg font-bold mb-2 text-[#191F28]">${ex.jp}</p>
                                    <p class="text-gray-400 text-sm font-bold">${ex.kr}</p>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.openDetail = (index, type) => {
            const word = type === 'gen' ? state.words[index] : state.folders.find(f => f.id === state.currentFolderId).words[index];
            const isSaved = state.folders.some(f => f.words.some(w => w.kanji === word.kanji));
            modalBody.innerHTML = `
                <div class="flex flex-col items-center text-center mb-8 view-content">
                    <span class="text-[10px] font-black text-toss-blue px-3 py-1 bg-blue-50 rounded-full mb-5 uppercase tracking-tighter">${word.part_of_speech || 'N' + state.level}</span>
                    <h2 class="text-5xl font-black mb-3 tracking-tighter">${word.kanji}</h2>
                    <p class="text-lg font-bold text-gray-300 mb-8 tracking-wider">${word.kana}</p>
                    <p class="text-[22px] font-black text-gray-800 tracking-tight">${word.korean_meaning}</p>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-10">
                    <div class="p-6 rounded-[36px] bg-pastel-blue/40 border border-white/50">
                        <p class="text-[10px] font-black text-blue-800/40 mb-3 uppercase tracking-widest">유의어</p>
                        <div class="flex flex-wrap gap-2">
                            ${(word.synonyms || []).map(s => `<span onclick="window.searchInDict('${s.split('(')[0]}')" class="chip-synonym">${s}</span>`).join('') || '-'}
                        </div>
                    </div>
                    <div class="p-6 rounded-[36px] bg-pastel-pink/40 border border-white/50">
                        <p class="text-[10px] font-black text-pink-800/40 mb-3 uppercase tracking-widest">반의어</p>
                        <div class="flex flex-wrap gap-2">
                            ${(word.antonyms || []).map(a => `<span onclick="window.searchInDict('${a.split('(')[0]}')" class="chip-antonym">${a}</span>`).join('') || '-'}
                        </div>
                    </div>
                </div>
                <div class="space-y-3 mb-12">
                    <p class="text-[10px] font-black text-gray-300 ml-1 uppercase tracking-widest">Sentences</p>
                    ${word.examples.map(ex => `
                        <div class="p-5 rounded-[32px] bg-white/40 border border-white/20">
                            <p class="text-[17px] font-bold text-gray-800 mb-1 leading-tight tracking-tight">${ex.jp}</p>
                            <p class="text-[13px] text-gray-400 font-bold">${ex.kr}</p>
                        </div>`).join('')}
                </div>
                <div class="flex flex-col gap-3">
                    <div class="flex gap-3 h-14">
                        <select id="folder-select" class="flex-1 px-6 bg-black/5 rounded-[24px] font-black text-xs outline-none appearance-none">${state.folders.map(f => `<option value="${f.id}">${f.name}</option>`).join('')}</select>
                        <button onclick="window.saveToFolder('${encodeURIComponent(JSON.stringify(word))}')" class="flex-[1.8] bg-toss-blue text-white rounded-[24px] font-black text-sm shadow-xl btn-press">${isSaved ? '다른 폴더 추가' : '단어장 저장'}</button>
                    </div>
                    <button onclick="window.searchInDict('${word.kanji}')" class="w-full h-14 bg-gray-100 text-gray-500 rounded-[24px] font-black text-xs btn-press">모찌 사전에서 분석하기</button>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        window.searchInDict = (word) => { window.closeModal(); state.view = 'dict'; state.dictSearch = word; updateUI(); setTimeout(() => window.searchDict(word), 300); };
        window.closeModal = () => modal.classList.add('hidden');
        window.nav = (v) => { state.view = v; updateUI(); window.scrollTo(0,0); };
        window.setLevel = (l) => { state.level = l; updateUI(); };
        window.generate = async () => { state.loading = true; updateUI(); try { const res = await fetch('/api/vocab', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({level: state.level}) }); const data = await res.json(); state.words = data; } catch (e) { showToast(`오류 발생`); } finally { state.loading = false; updateUI(); } };
        window.createFolder = () => { const name = prompt('폴더 이름:'); if (name) { state.folders.push({ id: 'f' + Date.now(), name, words: [] }); localStorage.setItem('jlpt_v6_folders', JSON.stringify(state.folders)); updateUI(); } };
        window.saveToFolder = (wordData) => { const word = JSON.parse(decodeURIComponent(wordData)); const folderId = document.getElementById('folder-select').value; const folder = state.folders.find(f => f.id === folderId); if (folder.words.some(w => w.kanji === word.kanji)) return showToast('이미 저장됨'); folder.words.unshift(word); localStorage.setItem('jlpt_v6_folders', JSON.stringify(state.folders)); showToast('저장 완료'); window.closeModal(); updateUI(); };
        
        updateUI();
    </script>
</body>
</html>
